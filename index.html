<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meal Planner" />
  <title>Meal Planner</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FAFAF8; }
    input, select, button, textarea { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;



const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
const MEALS = ["Breakfast", "Lunch", "Dinner"];

const MEAL_COLORS = {
  Breakfast: { bg: "#FFF7ED", accent: "#F97316", light: "#FFEDD5" },
  Lunch:     { bg: "#F0FDF4", accent: "#16A34A", light: "#DCFCE7" },
  Dinner:    { bg: "#EFF6FF", accent: "#2563EB", light: "#DBEAFE" },
};

// Morning & Evening reminder row styles
const REMINDER_ROWS = {
  Morning: { bg: "#FEFCE8", accent: "#CA8A04", light: "#FEF9C3", label: "Morning" },
  Evening: { bg: "#F5F3FF", accent: "#7C3AED", light: "#EDE9FE", label: "Evening" },
};

const DEFAULT_MENU = {
  Mon: { Breakfast: "Oats & berries",  Lunch: "Chicken salad",  Dinner: "Pasta bolognese" },
  Tue: { Breakfast: "Greek yogurt",    Lunch: "Lentil soup",    Dinner: "Stir-fry tofu"   },
  Wed: { Breakfast: "Avocado toast",   Lunch: "Tuna wrap",      Dinner: "Roast chicken"   },
  Thu: { Breakfast: "Smoothie bowl",   Lunch: "Quinoa bowl",    Dinner: "Salmon & veg"    },
  Fri: { Breakfast: "Eggs & toast",    Lunch: "BLT sandwich",   Dinner: "Homemade pizza"  },
  Sat: { Breakfast: "Pancakes",        Lunch: "Grilled cheese", Dinner: "Beef tacos"      },
  Sun: { Breakfast: "Full English",    Lunch: "Roast dinner",   Dinner: "Leftovers"       },
};

const DEFAULT_IDEAS = {
  Breakfast: ["Oats & berries","Greek yogurt","Avocado toast","Smoothie bowl","Eggs & toast","Pancakes","Full English","Granola & milk","Chia pudding","French toast"],
  Lunch:     ["Chicken salad","Lentil soup","Tuna wrap","Quinoa bowl","BLT sandwich","Grilled cheese","Roast dinner","Caesar salad","Veggie burger","Poke bowl"],
  Dinner:    ["Pasta bolognese","Stir-fry tofu","Roast chicken","Salmon & veg","Homemade pizza","Beef tacos","Leftovers","Lamb curry","Risotto","Fish & chips"],
};

const GROCERY_CATEGORIES = [
  { id: "produce", label: "Fruit & Veg",    icon: "🥦", color: "#16A34A", bg: "#F0FDF4" },
  { id: "meat",    label: "Meat & Fish",    icon: "🥩", color: "#DC2626", bg: "#FEF2F2" },
  { id: "dairy",   label: "Dairy & Eggs",   icon: "🥛", color: "#0891B2", bg: "#ECFEFF" },
  { id: "bakery",  label: "Bakery & Grains",icon: "🍞", color: "#D97706", bg: "#FFFBEB" },
  { id: "pantry",  label: "Pantry & Tins",  icon: "🥫", color: "#7C3AED", bg: "#F5F3FF" },
  { id: "frozen",  label: "Frozen",         icon: "❄️", color: "#2563EB", bg: "#EFF6FF" },
  { id: "drinks",  label: "Drinks",         icon: "🧃", color: "#0D9488", bg: "#F0FDFA" },
  { id: "other",   label: "Other",          icon: "🛒", color: "#78716C", bg: "#FAFAF8" },
];

let nextId = 1000;

// ── Week helpers ──
function getWeekKey(offset) {
  // ISO week-based key: "week:YYYY-WW"
  const d = new Date();
  d.setDate(d.getDate() + offset * 7);
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const week = Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
  return `week:${d.getFullYear()}-${String(week).padStart(2,"0")}`;
}

function getWeekDates(offset) {
  const d = new Date();
  // go to Monday of current week
  const day = d.getDay(); // 0=Sun
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff + offset * 7);
  return DAYS.map((_, i) => {
    const dd = new Date(d);
    dd.setDate(d.getDate() + i);
    return dd;
  });
}

function formatWeekRange(offset) {
  const dates = getWeekDates(offset);
  const start = dates[0];
  const end   = dates[6];
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  if (start.getMonth() === end.getMonth()) {
    return `${start.getDate()}–${end.getDate()} ${months[start.getMonth()]} ${start.getFullYear()}`;
  }
  return `${start.getDate()} ${months[start.getMonth()]} – ${end.getDate()} ${months[end.getMonth()]} ${end.getFullYear()}`;
}

// ── Icons ──
const ClipboardIcon = ({ color }) => (
  <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <rect x="4" y="3" width="9" height="11" rx="1.5"/>
    <path d="M4 5H3a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1v-1"/>
    <path d="M6 3V2a1 1 0 0 1 2 0v1"/>
  </svg>
);
const PencilIcon = ({ color }) => (
  <svg width="9" height="9" viewBox="0 0 12 12" fill={color}>
    <path d="M8.5 1.5a1.5 1.5 0 0 1 2 2L4 10H2v-2L8.5 1.5z"/>
  </svg>
);
const TrashIcon = ({ color }) => (
  <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round">
    <path d="M3 4h10M5 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1M6 7v5M10 7v5M4 4l1 9h6l1-9"/>
  </svg>
);
const CheckIcon = ({ color }) => (
  <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M2 6l3 3 5-5"/>
  </svg>
);
const PlusIcon = () => (
  <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
    <path d="M6 2v8M2 6h8"/>
  </svg>
);
const ChevronIcon = ({ dir }) => (
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    {dir === "left" ? <path d="M9 2L4 7l5 5"/> : <path d="M5 2l5 5-5 5"/>}
  </svg>
);

function MealPlanner() {
  // ── Week navigation ──
  const [weekOffset, setWeekOffset] = useState(0);
  const weekKey = getWeekKey(weekOffset);
  const weekDates = getWeekDates(weekOffset);

  // ── Planner state (per-week) ──
  const [allMenus, setAllMenus]   = useState({});   // { weekKey: menuObj }
  const [allReminders, setAllReminders] = useState({}); // { weekKey: { "Mon-Morning": ["haircut"], ... } }
  const [allPrep, setAllPrep]     = useState({});   // { weekKey: prepObj }

  // ── Global state ──
  const [ideas, setIdeas]         = useState(DEFAULT_IDEAS);
  const [groceries, setGroceries] = useState([]);
  const [stores, setStores]       = useState(["Tesco", "Farmers Market", "Lidl"]);

  // ── Planner UI state ──
  const [editing, setEditing]     = useState(null);
  const [editValue, setEditValue] = useState("");
  const [showIdeas, setShowIdeas] = useState(null);
  const [newIdea, setNewIdea]     = useState("");
  const [justSaved, setJustSaved] = useState(null);
  const [prepPanel, setPrepPanel] = useState(null);
  const [newPrepNote, setNewPrepNote]       = useState("");
  const [editingPrepIdx, setEditingPrepIdx] = useState(null);
  const [editingPrepVal, setEditingPrepVal] = useState("");

  // ── Reminder UI state ──
  const [editingReminder, setEditingReminder] = useState(null); // { day, slot, idx }
  const [editingReminderVal, setEditingReminderVal] = useState("");
  const [addingReminder, setAddingReminder]   = useState(null); // { day, slot }
  const [newReminderVal, setNewReminderVal]   = useState("");
  const reminderInputRef = useRef(null);

  // ── Grocery UI state ──
  const [newStoreName, setNewStoreName]           = useState("");
  const [filterStore, setFilterStore]             = useState("all");
  const [addingToCategory, setAddingToCategory]   = useState(null);
  const [newItem, setNewItem]                     = useState({ name: "", qty: "", store: "" });
  const [editingItem, setEditingItem]             = useState(null);
  const [showChecked, setShowChecked]             = useState(true);
  const addInputRef = useRef(null);

  // ── Load all data ──
  useEffect(() => {
    const load = async () => {
      try {
        const am = { value: localStorage.getItem("allMenus") };
        const ar = { value: localStorage.getItem("allReminders") };
        const ap = { value: localStorage.getItem("allPrep") };
        const i = { value: localStorage.getItem("ideas") };
        const g = { value: localStorage.getItem("groceries") };
        const st = { value: localStorage.getItem("stores") };
        if (am) setAllMenus(JSON.parse(am.value));
        if (ar) setAllReminders(JSON.parse(ar.value));
        if (ap) setAllPrep(JSON.parse(ap.value));
        if (i)  setIdeas(JSON.parse(i.value));
        if (g)  setGroceries(JSON.parse(g.value));
        if (st) setStores(JSON.parse(st.value));
      } catch {}
    };
    load();
  }, []);

  const persist = async (updates = {}) => {
    try {
      const s = (k, v) => { localStorage.setItem(k, JSON.stringify(v)); return Promise.resolve(); };
      await Promise.all([
        s("allMenus",     updates.allMenus     ?? allMenus),
        s("allReminders", updates.allReminders ?? allReminders),
        s("allPrep",      updates.allPrep      ?? allPrep),
        s("ideas",        updates.ideas        ?? ideas),
        s("groceries",    updates.groceries    ?? groceries),
        s("stores",       updates.stores       ?? stores),
      ]);
    } catch {}
  };

  // ── Current-week derived data ──
  const menu      = allMenus[weekKey]     ?? DEFAULT_MENU;
  const reminders = allReminders[weekKey] ?? {};
  const prep      = allPrep[weekKey]      ?? {};

  const setMenu = (nm) => {
    const u = { ...allMenus, [weekKey]: nm };
    setAllMenus(u); persist({ allMenus: u });
  };
  const setReminders = (nr) => {
    const u = { ...allReminders, [weekKey]: nr };
    setAllReminders(u); persist({ allReminders: u });
  };
  const setPrep = (np) => {
    const u = { ...allPrep, [weekKey]: np };
    setAllPrep(u); persist({ allPrep: u });
  };

  // ── Planner helpers ──
  const startEdit = (day, meal) => {
    setEditing({ day, meal }); setEditValue(menu[day][meal]); setPrepPanel(null);
    setAddingReminder(null);
  };
  const commitEdit = () => {
    if (!editing) return;
    const val = editValue.trim(); if (!val) { setEditing(null); return; }
    setMenu({ ...menu, [editing.day]: { ...menu[editing.day], [editing.meal]: val } });
    setJustSaved(`${editing.day}-${editing.meal}`);
    setTimeout(() => setJustSaved(null), 1200); setEditing(null);
  };
  const pickIdea = (day, meal, idea) => {
    setMenu({ ...menu, [day]: { ...menu[day], [meal]: idea } });
    setJustSaved(`${day}-${meal}`); setTimeout(() => setJustSaved(null), 1200); setEditing(null);
  };
  const addIdea = (meal) => {
    const t = newIdea.trim(); if (!t) return;
    const ni = { ...ideas, [meal]: [...ideas[meal], t] };
    setIdeas(ni); persist({ ideas: ni }); setNewIdea("");
  };
  const removeIdea = (meal, idx) => {
    const ni = { ...ideas, [meal]: ideas[meal].filter((_,i)=>i!==idx) };
    setIdeas(ni); persist({ ideas: ni });
  };

  // ── Prep helpers ──
  const prepKey    = (day, meal) => `${day}-${meal}`;
  const getPrepNotes = (day, meal) => prep[prepKey(day, meal)] || [];
  const openPrepPanel = (day, meal) => {
    setEditing(null); setAddingReminder(null);
    setPrepPanel({ day, meal }); setNewPrepNote(""); setEditingPrepIdx(null);
  };
  const closePrepPanel = () => { setPrepPanel(null); setNewPrepNote(""); setEditingPrepIdx(null); };
  const addPrepNote = () => {
    if (!prepPanel) return; const t = newPrepNote.trim(); if (!t) return;
    const k = prepKey(prepPanel.day, prepPanel.meal);
    setPrep({ ...prep, [k]: [...(prep[k]||[]), t] }); setNewPrepNote("");
  };
  const removePrepNote = (idx) => {
    const k = prepKey(prepPanel.day, prepPanel.meal);
    setPrep({ ...prep, [k]: (prep[k]||[]).filter((_,i)=>i!==idx) });
  };
  const startEditPrepNote = (idx, val) => { setEditingPrepIdx(idx); setEditingPrepVal(val); };
  const commitEditPrepNote = (idx) => {
    if (!prepPanel) return;
    const t = editingPrepVal.trim();
    const k = prepKey(prepPanel.day, prepPanel.meal);
    const arr = [...(prep[k]||[])];
    if (!t) arr.splice(idx,1); else arr[idx]=t;
    setPrep({ ...prep, [k]: arr }); setEditingPrepIdx(null);
  };

  // ── Reminder helpers ──
  const reminderKey = (day, slot) => `${day}-${slot}`;
  const getDayReminders = (day, slot) => reminders[reminderKey(day, slot)] || [];
  const openAddReminder = (day, slot) => {
    setEditing(null); setPrepPanel(null);
    setAddingReminder({ day, slot }); setNewReminderVal("");
    setTimeout(() => reminderInputRef.current?.focus(), 40);
  };
  const commitAddReminder = () => {
    if (!addingReminder) return;
    const t = newReminderVal.trim(); if (!t) { setAddingReminder(null); return; }
    const k = reminderKey(addingReminder.day, addingReminder.slot);
    setReminders({ ...reminders, [k]: [...(reminders[k]||[]), t] });
    setNewReminderVal(""); setAddingReminder(null);
  };
  const removeReminder = (day, slot, idx) => {
    const k = reminderKey(day, slot);
    setReminders({ ...reminders, [k]: (reminders[k]||[]).filter((_,i)=>i!==idx) });
  };
  const startEditReminder = (day, slot, idx, val) => {
    setEditingReminder({ day, slot, idx }); setEditingReminderVal(val);
  };
  const commitEditReminder = () => {
    if (!editingReminder) return;
    const { day, slot, idx } = editingReminder;
    const t = editingReminderVal.trim();
    const k = reminderKey(day, slot);
    const arr = [...(reminders[k]||[])];
    if (!t) arr.splice(idx,1); else arr[idx]=t;
    setReminders({ ...reminders, [k]: arr }); setEditingReminder(null);
  };

  // ── Grocery helpers ──
  const openAddToCategory = (catId) => {
    setAddingToCategory(catId);
    setNewItem({ name: "", qty: "", store: stores[0]||"" });
    setTimeout(() => addInputRef.current?.focus(), 50);
  };
  const commitAddItem = (catId) => {
    const name = newItem.name.trim(); if (!name) { setAddingToCategory(null); return; }
    const item = { id: ++nextId, name, qty: newItem.qty.trim(), store: newItem.store, categoryId: catId, checked: false };
    const ng = [...groceries, item];
    setGroceries(ng); persist({ groceries: ng }); setNewItem({ name:"",qty:"",store:stores[0]||"" }); setAddingToCategory(null);
  };
  const toggleItem = (id) => {
    const ng = groceries.map(g => g.id===id ? {...g,checked:!g.checked} : g);
    setGroceries(ng); persist({ groceries: ng });
  };
  const removeItem = (id) => {
    const ng = groceries.filter(g=>g.id!==id);
    setGroceries(ng); persist({ groceries: ng });
  };
  const clearChecked = () => {
    const ng = groceries.filter(g=>!g.checked);
    setGroceries(ng); persist({ groceries: ng });
  };
  const startEditItem = (item) => setEditingItem({ ...item });
  const commitEditItem = () => {
    if (!editingItem) return;
    const ng = groceries.map(g => g.id===editingItem.id ? {...editingItem,name:editingItem.name.trim()||g.name} : g);
    setGroceries(ng); persist({ groceries: ng }); setEditingItem(null);
  };
  const addStore = () => {
    const t = newStoreName.trim(); if (!t||stores.includes(t)) { setNewStoreName(""); return; }
    const ns = [...stores, t]; setStores(ns); persist({ stores: ns }); setNewStoreName("");
  };
  const removeStore = (s) => {
    const ns = stores.filter(x=>x!==s); setStores(ns); persist({ stores: ns });
  };

  // ── Today highlight ──
  const todayDate = new Date();
  const todayDow = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][todayDate.getDay()];
  const isCurrentWeek = weekOffset === 0;

  const STORE_COLORS = ["#7C3AED","#0D9488","#DC2626","#D97706","#2563EB","#DB2777","#0891B2","#16A34A"];
  const storeColor = (s) => STORE_COLORS[stores.indexOf(s) % STORE_COLORS.length] || "#78716C";

  const checkedCount = groceries.filter(g=>g.checked).length;
  const totalCount   = groceries.length;
  const visibleItems = (catId) => groceries.filter(g =>
    g.categoryId===catId &&
    (filterStore==="all"||g.store===filterStore) &&
    (showChecked||!g.checked)
  );

  const panelMealColor = prepPanel ? MEAL_COLORS[prepPanel.meal] : null;
  const panelNotes     = prepPanel ? getPrepNotes(prepPanel.day, prepPanel.meal) : [];

  // ── Row config: Morning, meals, Evening ──
  const ALL_ROWS = [
    { type: "reminder", slot: "Morning", ...REMINDER_ROWS.Morning },
    { type: "meal",     slot: "Breakfast" },
    { type: "meal",     slot: "Lunch"     },
    { type: "meal",     slot: "Dinner"    },
    { type: "reminder", slot: "Evening",  ...REMINDER_ROWS.Evening },
  ];

  // ── Reminder cell component ──
  const ReminderCell = ({ day, slot, color, bg, light }) => {
    const items = getDayReminders(day, slot);
    const isAdding = addingReminder?.day===day && addingReminder?.slot===slot;
    return (
      <div style={{ background: bg, borderTop: "1px solid #E7E5E4", borderLeft: "1px solid #E7E5E4", padding: "6px 8px", minHeight: 54, display: "flex", flexDirection: "column", gap: 3 }}>
        {items.map((item, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 4 }}>
            {editingReminder?.day===day && editingReminder?.slot===slot && editingReminder?.idx===i ? (
              <input autoFocus value={editingReminderVal}
                onChange={e=>setEditingReminderVal(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")commitEditReminder();if(e.key==="Escape")setEditingReminder(null);}}
                onBlur={commitEditReminder}
                style={{ flex:1, border:`1px solid ${color}`, borderRadius:4, padding:"2px 5px", fontSize:11, fontFamily:"system-ui,sans-serif", outline:"none", background:"#fff", minWidth:0 }} />
            ) : (
              <>
                <div style={{ width:4,height:4,borderRadius:"50%",background:color,flexShrink:0 }} />
                <span onClick={()=>startEditReminder(day,slot,i,item)} style={{ flex:1,fontSize:11,fontFamily:"system-ui,sans-serif",color:"#44403C",lineHeight:1.3,cursor:"pointer",minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{item}</span>
                <button onClick={()=>removeReminder(day,slot,i)} style={{ background:"none",border:"none",color:"#C4B5A5",cursor:"pointer",fontSize:12,padding:0,lineHeight:1,flexShrink:0 }}>×</button>
              </>
            )}
          </div>
        ))}
        {isAdding ? (
          <div style={{ display:"flex",gap:3,marginTop:2 }}>
            <input ref={reminderInputRef} value={newReminderVal}
              onChange={e=>setNewReminderVal(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")commitAddReminder();if(e.key==="Escape")setAddingReminder(null);}}
              onBlur={commitAddReminder}
              placeholder="Add…"
              style={{ flex:1,border:`1.5px solid ${color}`,borderRadius:5,padding:"3px 6px",fontSize:11,fontFamily:"system-ui,sans-serif",outline:"none",background:"#fff",minWidth:0 }} />
          </div>
        ) : (
          <button onClick={()=>openAddReminder(day,slot)} style={{ alignSelf:"flex-start",background:"transparent",border:`1px dashed ${color}60`,borderRadius:4,padding:"2px 6px",fontSize:9,color:color,cursor:"pointer",fontFamily:"system-ui,sans-serif",letterSpacing:"0.04em",marginTop: items.length>0?2:0 }}>
            + add
          </button>
        )}
      </div>
    );
  };

  return (
    <div style={{ minHeight:"100vh", background:"#FAFAF8", fontFamily:"'Georgia','Times New Roman',serif" }}>

      {/* ══════════ HEADER ══════════ */}
      <div style={{ background:"#1C1917", padding:"20px 32px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:16, flexWrap:"wrap" }}>
        <div>
          <div style={{ color:"#A8A29E", fontSize:11, letterSpacing:"0.18em", textTransform:"uppercase", marginBottom:3, fontFamily:"system-ui,sans-serif" }}>Weekly</div>
          <h1 style={{ color:"#FAFAF8", margin:0, fontSize:26, fontWeight:"normal", letterSpacing:"-0.02em" }}>Meal Planner</h1>
        </div>

        {/* Week navigation */}
        <div style={{ display:"flex", alignItems:"center", gap:10, background:"#292524", borderRadius:10, padding:"8px 14px" }}>
          <button onClick={()=>{setWeekOffset(v=>v-1);setEditing(null);setPrepPanel(null);setAddingReminder(null);}}
            style={{ background:"transparent",border:"none",color:"#D6D3D1",cursor:"pointer",padding:2,display:"flex",alignItems:"center" }}>
            <ChevronIcon dir="left" />
          </button>
          <div style={{ textAlign:"center", minWidth:160 }}>
            <div style={{ color: weekOffset===0?"#FCD34D":"#D6D3D1", fontSize:13, fontFamily:"system-ui,sans-serif", fontWeight:600, letterSpacing:"0.01em" }}>
              {weekOffset===0 ? "This week" : weekOffset===-1 ? "Last week" : weekOffset===1 ? "Next week" : weekOffset > 0 ? `+${weekOffset} weeks` : `${weekOffset} weeks`}
            </div>
            <div style={{ color:"#A8A29E", fontSize:11, fontFamily:"system-ui,sans-serif", marginTop:1 }}>{formatWeekRange(weekOffset)}</div>
          </div>
          <button onClick={()=>{setWeekOffset(v=>v+1);setEditing(null);setPrepPanel(null);setAddingReminder(null);}}
            style={{ background:"transparent",border:"none",color:"#D6D3D1",cursor:"pointer",padding:2,display:"flex",alignItems:"center" }}>
            <ChevronIcon dir="right" />

                      <div style={{ display:"flex",gap:6 }}>
                        <input value={newItem.qty} onChange={e=>setNewItem(v=>({...v,qty:e.target.value}))} placeholder="Qty (e.g. 2, 500g)"
                          style={{ flex:1,border:`1px solid ${cat.color}40`,borderRadius:7,padding:"5px 8px",fontSize:12,fontFamily:"system-ui,sans-serif",outline:"none",background:"#fff" }} />
                        <select value={newItem.store} onChange={e=>setNewItem(v=>({...v,store:e.target.value}))}
                          style={{ flex:1,border:`1px solid ${cat.color}40`,borderRadius:7,padding:"5px 8px",fontSize:12,fontFamily:"system-ui,sans-serif",outline:"none",background:"#fff",cursor:"pointer" }}>
                          <option value="">No store</option>
                          {stores.map(s=><option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                      <div style={{ display:"flex",gap:6 }}>
                        <button onClick={()=>commitAddItem(cat.id)} style={{ flex:1,background:cat.color,color:"#fff",border:"none",borderRadius:7,padding:"6px",fontSize:12,cursor:"pointer",fontFamily:"system-ui,sans-serif",fontWeight:600 }}>Add item</button>
                        <button onClick={()=>setAddingToCategory(null)} style={{ flex:1,background:"transparent",color:"#A8A29E",border:"1px solid #E7E5E4",borderRadius:7,padding:"6px",fontSize:12,cursor:"pointer",fontFamily:"system-ui,sans-serif" }}>Cancel</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <style>{`
        @keyframes slideDown { from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);} }
        @keyframes slideIn  { from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);} }
      `}</style>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MealPlanner />);
  </script>
</body>
</html>
