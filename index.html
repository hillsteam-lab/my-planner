<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meal Planner" />
  <title>Meal Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #FAFAF8; }
    input, select, button, textarea { font-family: inherit; }
    input { -webkit-appearance: none; border-radius: 0; }
  </style>

<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script>
    function _ls(key) {
      try { var v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : null; } catch(e) { return null; }
    }
  </script>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;



const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
const MEALS = ["Breakfast", "Lunch", "Dinner"];

const MEAL_COLORS = {
  Breakfast: { bg: "#FFF7ED", accent: "#F97316", light: "#FFEDD5" },
  Lunch:     { bg: "#F0FDF4", accent: "#16A34A", light: "#DCFCE7" },
  Dinner:    { bg: "#EFF6FF", accent: "#2563EB", light: "#DBEAFE" },
};

const REMINDER_ROWS = {
  Morning: { bg: "#FEFCE8", accent: "#CA8A04", light: "#FEF9C3", label: "Morning" },
  Evening: { bg: "#F5F3FF", accent: "#7C3AED", light: "#EDE9FE", label: "Evening" },
};

const DEFAULT_MENU = {
  Mon: { Breakfast: "Oats",          Egg: "Fried",     Lunch: "", Dinner: "Chicken Rice Bowl"    },
  Tue: { Breakfast: "Dry Noodles",   Egg: "Scrambled", Lunch: "", Dinner: "Prawn Pesto Pasta"    },
  Wed: { Breakfast: "Sweet Potato",  Egg: "Poached",   Lunch: "", Dinner: "Beef Witch's Stew"    },
  Thu: { Breakfast: "Cheung Fun",    Egg: "Boiled",    Lunch: "", Dinner: "Salmon & Mash"        },
  Fri: { Breakfast: "Sandwich",      Egg: "Fried",     Lunch: "", Dinner: "Chicken Wings & Veg"  },
  Sat: { Breakfast: "Congee",        Egg: "Steamed",   Lunch: "", Dinner: "Burger / Steak"       },
  Sun: { Breakfast: "Wonton Noodles",Egg: "Boiled",    Lunch: "", Dinner: "Tofu"                 },
};

// Version key — bump this to reset saved menus to defaults
const MENU_VERSION = "v3";

// Grocery categories with keywords for auto-sorting
const GROCERY_CATS = ["Vegetable","Fruit","Meat","Seafood","Dairy","Pantry","Produce","Frozen","Household"];

const CAT_KEYWORDS = {
  Vegetable: ["garlic","onion","onions","tomato","tomatoes","spinach","kale","lettuce","carrot","carrots","potato","potatoes","sweet potato","avocado","broccoli","mushroom","mushrooms","ginger","herb","herbs","spring onion","bok choy","bok choi","coriander","basil","cucumber","capsicum","zucchini","celery","leek","chili","chilli","edamame","pea","peas","corn","broccolini","eggplant","cauliflower"],
  Fruit:     ["papaya","apple","banana","lemon","lime","berry","berries","pear","mango","grape","grapes","orange","oranges","strawberry","blueberry","watermelon","peach","plum","cherry","kiwi","pineapple"],
  Meat:      ["chicken","beef","pork","lamb","mince","steak","bacon","sausage","sausages","turkey","ham","salami","tofu","dumpling","wonton"],
  Seafood:   ["fish","salmon","tuna","prawn","prawns","shrimp","anchov","squid","crab","lobster","scallop","oyster","mussel","cod","snapper"],
  Dairy:     ["egg","eggs","milk","butter","cream","cheese","yogurt","yoghurt","parmesan","mozzarella","cheddar","feta","ricotta","sour cream","creme fraiche"],
  Pantry:    ["pasta","noodle","noodles","rice","quinoa","lentil","lentils","bean","beans","tin","tinned","can","canned","oil","olive oil","soy sauce","sauce","stock","broth","spice","spices","salt","pepper","sugar","honey","vinegar","mustard","mayo","ketchup","peanut butter","jam","cereal","oat","oats","coconut milk","coconut","curry","cumin","paprika","turmeric","cinnamon","bay","thyme","oregano","rosemary","cheung fun","congee rice","bread","toast","sourdough","baguette","roll","rolls","bagel","tortilla","wrap","pita","naan","flour","yeast","bun","buns","croissant","crumpet"],
  Produce:   ["fruit","veg","vegetable","fresh","salad"],
  Frozen:    ["frozen","ice cream"],
  Household: ["soap","detergent","towel","tissue","paper","bin bag","cleaning","shampoo","conditioner","toothpaste"],
};

function guessCategory(name) {
  const lower = name.toLowerCase();
  for (const [cat, kws] of Object.entries(CAT_KEYWORDS)) {
    if (kws.some(kw => lower.includes(kw))) return cat;
  }
  return "Pantry";
}

let nextId = 1000;

function getWeekKey(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset * 7);
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const week = Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
  return `week:${d.getFullYear()}-${String(week).padStart(2,"0")}`;
}

function getWeekDates(offset) {
  const d = new Date();
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff + offset * 7);
  return DAYS.map((_, i) => { const dd = new Date(d); dd.setDate(d.getDate() + i); return dd; });
}

function formatWeekRange(offset) {
  const dates = getWeekDates(offset);
  const [start, end] = [dates[0], dates[6]];
  const M = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return start.getMonth() === end.getMonth()
    ? `${start.getDate()}–${end.getDate()} ${M[start.getMonth()]} ${start.getFullYear()}`
    : `${start.getDate()} ${M[start.getMonth()]} – ${end.getDate()} ${M[end.getMonth()]} ${end.getFullYear()}`;
}

// ── Icons ──
const ClipboardIcon = ({ color }) => (
  <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <rect x="4" y="3" width="9" height="11" rx="1.5"/>
    <path d="M4 5H3a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1v-1"/>
    <path d="M6 3V2a1 1 0 0 1 2 0v1"/>
  </svg>
);
const IngredientsIcon = ({ color }) => (
  <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <path d="M3 5h10M3 8h7M3 11h5"/>
  </svg>
);
const ChevronIcon = ({ dir }) => (
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    {dir === "left" ? <path d="M9 2L4 7l5 5"/> : <path d="M5 2l5 5-5 5"/>}
  </svg>
);

// ── ReminderCell defined OUTSIDE MealPlanner so it never remounts on re-render ──
function ReminderCell({ day, slot, color, bg, items, isAdding, addingReminderVal, editingReminder, editingReminderVal, reminderInputRef, onAdd, onCommitAdd, onCancelAdd, onChangeAddVal, onStartEdit, onCommitEdit, onCancelEdit, onChangeEditVal, onRemove }) {
  return (
    <div style={{ background:bg, borderTop:"1px solid #E7E5E4", borderLeft:"1px solid #E7E5E4", padding:"6px 8px", minHeight:50, display:"flex", flexDirection:"column", gap:3 }}>
      {items.map((item, i) => (
        <div key={i} style={{ display:"flex", alignItems:"center", gap:4 }}>
          {editingReminder?.day===day && editingReminder?.slot===slot && editingReminder?.idx===i ? (
            <>
              <input value={editingReminderVal} onChange={e=>onChangeEditVal(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")onCommitEdit();if(e.key==="Escape")onCancelEdit();}}
                style={{ flex:1,border:`1px solid ${color}`,borderRadius:4,padding:"2px 5px",fontSize:11,fontFamily:"system-ui,sans-serif",outline:"none",background:"#fff",minWidth:0 }} />
              <button onMouseDown={e=>{e.preventDefault();onCommitEdit();}} style={{ background:color,border:"none",color:"#fff",borderRadius:4,padding:"2px 6px",fontSize:11,cursor:"pointer" }}>✓</button>
            </>
          ) : (
            <>
              <div style={{ width:4,height:4,borderRadius:"50%",background:color,flexShrink:0 }} />
              <span onClick={()=>onStartEdit(i,item)} style={{ flex:1,fontSize:11,fontFamily:"system-ui,sans-serif",color:"#44403C",lineHeight:1.3,cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{item}</span>
              <button onClick={()=>onRemove(i)} style={{ background:"none",border:"none",color:"#C4B5A5",cursor:"pointer",fontSize:12,padding:0,lineHeight:1 }}>×</button>
            </>
          )}
        </div>
      ))}
      {isAdding ? (
        <div style={{ display:"flex", gap:3, marginTop:2 }}>
          <input ref={reminderInputRef} value={addingReminderVal} onChange={e=>onChangeAddVal(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")onCommitAdd();if(e.key==="Escape")onCancelAdd();}}
            placeholder="Add…"
            style={{ flex:1,border:`1.5px solid ${color}`,borderRadius:5,padding:"3px 6px",fontSize:11,fontFamily:"system-ui,sans-serif",outline:"none",background:"#fff",minWidth:0 }} />
          <button onMouseDown={e=>{e.preventDefault();onCommitAdd();}} style={{ background:color,border:"none",color:"#fff",borderRadius:5,padding:"3px 8px",fontSize:13,cursor:"pointer" }}>✓</button>
        </div>
      ) : (
        <button onClick={onAdd} style={{ alignSelf:"flex-start",background:"transparent",border:`1px dashed ${color}60`,borderRadius:4,padding:"2px 6px",fontSize:9,color:color,cursor:"pointer",fontFamily:"system-ui,sans-serif",marginTop:items.length>0?2:0 }}>
          + add
        </button>
      )}
    </div>
  );
}

function MealPlanner() {
  // ── Week nav ──
  const [weekOffset, setWeekOffset] = useState(0);
  const weekKey = getWeekKey(weekOffset);
  const weekDates = getWeekDates(weekOffset);

  // ── Planner data (per-week) ──
  const [allMenus, setAllMenus]         = useState({});
  const [allReminders, setAllReminders] = useState({});
  const [allPrep, setAllPrep]           = useState({});
  // ingredients: { "Mon-Breakfast": ["oats","papaya","walnuts"], ... }
  const [allIngredients, setAllIngredients] = useState({});

  // ── Grocery data (global, like your groceries app) ──
  // item: { id, name, cat, status: "ok"|"low"|"out", checked, source: "manual"|"meal" }
  const [groceryItems, setGroceryItems] = useState([]);
  const [groceryTab, setGroceryTab]     = useState("pantry"); // "pantry" | "list"
  const [newGrocName, setNewGrocName]   = useState("");
  const [newGrocCat, setNewGrocCat]     = useState("Vegetable");

  // ── Planner UI ──
  const [editing, setEditing]         = useState(null); // { day, meal } for meal name editing
  const [editValue, setEditValue]     = useState("");
  const [showIdeasFor, setShowIdeasFor] = useState(null);
  const [justSaved, setJustSaved]     = useState(null);
  const [prepPanel, setPrepPanel]     = useState(null);
  const [newPrepNote, setNewPrepNote] = useState("");
  const [editingPrepIdx, setEditingPrepIdx] = useState(null);
  const [editingPrepVal, setEditingPrepVal] = useState("");

  // ── Ingredients panel ──
  const [ingredientsPanel, setIngredientsPanel] = useState(null); // { day, meal }
  const [newIngredient, setNewIngredient]       = useState("");
  const [newIngredientCat, setNewIngredientCat]   = useState("Vegetable");
  const ingInputRef = useRef(null);

  // ── Reminders ──
  const [addingReminder, setAddingReminder]         = useState(null);
  const [newReminderVal, setNewReminderVal]         = useState("");
  const [editingReminder, setEditingReminder]       = useState(null);
  const [editingReminderVal, setEditingReminderVal] = useState("");
  const reminderInputRef = useRef(null);

  // ── Load ──
  useEffect(() => {
    const L = k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } };
    // Version check: if menu version changed, reset menus to new defaults
    const savedVersion = L("menuVersion");
    if (savedVersion !== MENU_VERSION) {
      localStorage.removeItem("allMenus");
      try { localStorage.setItem("menuVersion", JSON.stringify(MENU_VERSION)); } catch {}
    } else {
      const am = L("allMenus"); if (am) setAllMenus(am);
    }
    const ar = L("allReminders");   if (ar) setAllReminders(ar);
    const ap = L("allPrep");        if (ap) setAllPrep(ap);
    const ai = L("allIngredients"); if (ai) setAllIngredients(ai);
    const gi = L("groceryItems");   if (gi) setGroceryItems(gi);
  }, []);

  const save = (updates = {}) => {
    const S = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
    S("allMenus",       updates.allMenus       ?? allMenus);
    S("allReminders",   updates.allReminders   ?? allReminders);
    S("allPrep",        updates.allPrep        ?? allPrep);
    S("allIngredients", updates.allIngredients ?? allIngredients);
    S("groceryItems",   updates.groceryItems   ?? groceryItems);
  };

  // ── Current week derived ──
  const menu      = allMenus[weekKey]      ?? DEFAULT_MENU;
  const reminders = allReminders[weekKey]  ?? {};
  const prep      = allPrep[weekKey]       ?? {};
  const ingredients = allIngredients[weekKey] ?? {};

  const setMenu = nm => { const u = {...allMenus,[weekKey]:nm}; setAllMenus(u); save({allMenus:u}); };
  const setReminders = nr => { const u = {...allReminders,[weekKey]:nr}; setAllReminders(u); save({allReminders:u}); };
  const setPrep = np => { const u = {...allPrep,[weekKey]:np}; setAllPrep(u); save({allPrep:u}); };
  const setIngredients = ni => { const u = {...allIngredients,[weekKey]:ni}; setAllIngredients(u); save({allIngredients:u}); };

  // ── Ingredient helpers ──
  const ingKey = (day, meal) => `${day}-${meal}`;
  const getIngredients = (day, meal) => ingredients[ingKey(day, meal)] || [];

  const openIngredientsPanel = (day, meal) => {
    setPrepPanel(null); setEditing(null); setAddingReminder(null);
    setIngredientsPanel({ day, meal }); setNewIngredient("");
    setTimeout(() => ingInputRef.current?.focus(), 50);
  };
  const closeIngredientsPanel = () => { setIngredientsPanel(null); setNewIngredient(""); };

  const addIngredient = () => {
    if (!ingredientsPanel) return;
    const t = newIngredient.trim(); if (!t) return;
    const cat = newIngredientCat;
    const k = ingKey(ingredientsPanel.day, ingredientsPanel.meal);
    const existing = ingredients[k] || [];
    if (existing.some(e => (e.name||e).toLowerCase() === t.toLowerCase())) { setNewIngredient(""); return; }
    const newEnt = { name: t, cat };
    const ni = { ...ingredients, [k]: [...existing, newEnt] };
    setIngredients(ni);
    // Auto-add to grocery pantry if not already there
    const lower = t.toLowerCase();
    const alreadyExists = groceryItems.some(g => g.name.toLowerCase() === lower);
    if (!alreadyExists) {
      const newItem = { id: ++nextId, name: t, cat, status: "ok", checked: false, source: "meal" };
      const ng = [...groceryItems, newItem];
      setGroceryItems(ng);
      save({ allIngredients: { ...allIngredients, [weekKey]: ni }, groceryItems: ng });
    } else {
      // Update cat in grocery if it exists
      const ng = groceryItems.map(g => g.name.toLowerCase()===lower ? {...g, cat} : g);
      setGroceryItems(ng);
      save({ allIngredients: { ...allIngredients, [weekKey]: ni }, groceryItems: ng });
    }
    setNewIngredient("");
  };

  const removeIngredient = (day, meal, idx) => {
    const k = ingKey(day, meal);
    const arr = [...(ingredients[k] || [])];
    arr.splice(idx, 1);
    setIngredients({ ...ingredients, [k]: arr });
  };
  const updateIngredientCat = (day, meal, idx, cat) => {
    const k = ingKey(day, meal);
    const arr = [...(ingredients[k] || [])];
    const existing = arr[idx];
    const name = existing.name || existing;
    arr[idx] = { name, cat };
    setIngredients({ ...ingredients, [k]: arr });
    // Update in grocery list too
    const lower = name.toLowerCase();
    const ng = groceryItems.map(g => g.name.toLowerCase()===lower ? {...g, cat} : g);
    setGroceryItems(ng);
    save({ allIngredients: { ...allIngredients, [weekKey]: { ...ingredients, [k]: arr } }, groceryItems: ng });
  };

  // ── Meal name editing (now just for meal name, no idea picker) ──
  const startEditMeal = (day, meal) => {
    setIngredientsPanel(null); setPrepPanel(null); setAddingReminder(null);
    setEditing({ day, meal }); setEditValue(menu[day][meal]);
  };
  const commitEdit = () => {
    if (!editing) return;
    const val = editValue.trim(); if (!val) { setEditing(null); return; }
    setMenu({ ...menu, [editing.day]: { ...menu[editing.day], [editing.meal]: val } });
    setJustSaved(`${editing.day}-${editing.meal}`);
    setTimeout(() => setJustSaved(null), 1200); setEditing(null);
  };

  // ── Prep ──
  const prepKey = (day, meal) => `${day}-${meal}`;
  const getPrepNotes = (day, meal) => prep[prepKey(day, meal)] || [];
  const openPrepPanel = (day, meal) => {
    setEditing(null); setIngredientsPanel(null); setAddingReminder(null);
    setPrepPanel({ day, meal }); setNewPrepNote(""); setEditingPrepIdx(null);
  };
  const closePrepPanel = () => { setPrepPanel(null); };
  const addPrepNote = () => {
    if (!prepPanel) return; const t = newPrepNote.trim(); if (!t) return;
    const k = prepKey(prepPanel.day, prepPanel.meal);
    setPrep({ ...prep, [k]: [...(prep[k]||[]), t] }); setNewPrepNote("");
  };
  const removePrepNote = idx => {
    const k = prepKey(prepPanel.day, prepPanel.meal);
    setPrep({ ...prep, [k]: (prep[k]||[]).filter((_,i)=>i!==idx) });
  };
  const commitEditPrepNote = idx => {
    const t = editingPrepVal.trim();
    const k = prepKey(prepPanel.day, prepPanel.meal);
    const arr = [...(prep[k]||[])];
    if (!t) arr.splice(idx,1); else arr[idx]=t;
    setPrep({ ...prep, [k]: arr }); setEditingPrepIdx(null);
  };

  // ── Reminders ──
  const remKey = (day, slot) => `${day}-${slot}`;
  const getDayReminders = (day, slot) => reminders[remKey(day, slot)] || [];
  const openAddReminder = (day, slot) => {
    setEditing(null); setPrepPanel(null); setIngredientsPanel(null);
    setAddingReminder({ day, slot }); setNewReminderVal("");
    setTimeout(() => reminderInputRef.current?.focus(), 40);
  };
  const commitAddReminder = () => {
    if (!addingReminder) return;
    const t = newReminderVal.trim(); if (!t) { setAddingReminder(null); return; }
    const k = remKey(addingReminder.day, addingReminder.slot);
    setReminders({ ...reminders, [k]: [...(reminders[k]||[]), t] });
    setNewReminderVal(""); setAddingReminder(null);
  };
  const removeReminder = (day, slot, idx) => {
    const k = remKey(day, slot);
    setReminders({ ...reminders, [k]: (reminders[k]||[]).filter((_,i)=>i!==idx) });
  };
  const commitEditReminder = () => {
    if (!editingReminder) return;
    const { day, slot, idx } = editingReminder;
    const t = editingReminderVal.trim();
    const k = remKey(day, slot);
    const arr = [...(reminders[k]||[])];
    if (!t) arr.splice(idx,1); else arr[idx]=t;
    setReminders({ ...reminders, [k]: arr }); setEditingReminder(null);
  };

  // ── Grocery helpers ──
  const setStatus = (id, status) => {
    const ng = groceryItems.map(g => g.id===id ? {...g, status} : g);
    setGroceryItems(ng); save({ groceryItems: ng });
  };
  const toggleChecked = id => {
    const ng = groceryItems.map(g => g.id===id ? {...g, checked:!g.checked} : g);
    setGroceryItems(ng); save({ groceryItems: ng });
  };
  const removeGrocItem = id => {
    const ng = groceryItems.filter(g => g.id!==id);
    setGroceryItems(ng); save({ groceryItems: ng });
  };
  const addGrocItem = () => {
    const name = newGrocName.trim(); if (!name) return;
    const cat = guessCategory(name) !== "Other" ? guessCategory(name) : newGrocCat;
    const ng = [...groceryItems, { id: ++nextId, name, cat, status: "ok", checked: false, source: "manual" }];
    setGroceryItems(ng); save({ groceryItems: ng }); setNewGrocName("");
  };
  const clearChecked = () => {
    const ng = groceryItems.map(g => ({...g, checked: false}));
    setGroceryItems(ng); save({ groceryItems: ng });
  };

  // ── Today ──
  const todayDow = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()];
  const isCurrentWeek = weekOffset === 0;

  // ── Grocery derived ──
  const needItems = groceryItems.filter(g => g.status === "low" || g.status === "out");
  const lowCount = needItems.length;
  const tickedCount = needItems.filter(g => g.checked).length;

  // ── Row config ──
  const ALL_ROWS = [
    { type: "reminder", slot: "Morning",   ...REMINDER_ROWS.Morning },
    { type: "meal",     slot: "Breakfast" },
    { type: "egg" },
    { type: "meal",     slot: "Lunch"     },
    { type: "meal",     slot: "Dinner"    },
    { type: "reminder", slot: "Evening",  ...REMINDER_ROWS.Evening },
  ];

  // ── Reminder cell ──
  // ReminderCell moved outside component

  const panelMealColor = prepPanel ? MEAL_COLORS[prepPanel.meal] : ingredientsPanel ? MEAL_COLORS[ingredientsPanel.meal] : null;
  const panelNotes     = prepPanel ? getPrepNotes(prepPanel.day, prepPanel.meal) : [];
  const panelIngredients = ingredientsPanel ? getIngredients(ingredientsPanel.day, ingredientsPanel.meal) : [];

  return (
    <div style={{ minHeight:"100vh", background:"#FAFAF8", fontFamily:"'Georgia','Times New Roman',serif" }}>

      {/* ══ HEADER ══ */}
      <div style={{ background:"#1C1917", padding:"20px 32px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:16, flexWrap:"wrap" }}>
        <div>
          <div style={{ color:"#A8A29E", fontSize:11, letterSpacing:"0.18em", textTransform:"uppercase", marginBottom:3, fontFamily:"system-ui,sans-serif" }}>Weekly</div>
          <h1 style={{ color:"#FAFAF8", margin:0, fontSize:26, fontWeight:"normal", letterSpacing:"-0.02em" }}>Meal Planner</h1>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10, background:"#292524", borderRadius:10, padding:"8px 14px" }}>
          <button onClick={()=>{setWeekOffset(v=>v-1);setEditing(null);setPrepPanel(null);setIngredientsPanel(null);setAddingReminder(null);}}
            style={{ background:"transparent",border:"none",color:"#D6D3D1",cursor:"pointer",padding:2,display:"flex",alignItems:"center" }}>
            <ChevronIcon dir="left" />
          </button>
          <div style={{ textAlign:"center", minWidth:160 }}>
            <div style={{ color:weekOffset===0?"#FCD34D":"#D6D3D1", fontSize:13, fontFamily:"system-ui,sans-serif", fontWeight:600 }}>
              {weekOffset===0?"This week":weekOffset===-1?"Last week":weekOffset===1?"Next week":weekOffset>0?`+${weekOffset} weeks`:`${weekOffset} weeks`}
            </div>
            <div style={{ color:"#A8A29E", fontSize:11, fontFamily:"system-ui,sans-serif", marginTop:1 }}>{formatWeekRange(weekOffset)}</div>
          </div>
          <button onClick={()=>{setWeekOffset(v=>v+1);setEditing(null);setPrepPanel(null);setIngredientsPanel(null);setAddingReminder(null);}}
            style={{ background:"transparent",border:"none",color:"#D6D3D1",cursor:"pointer",padding:2,display:"flex",alignItems:"center" }}>
            <ChevronIcon dir="right" />
          </button>
          {weekOffset!==0 && (
            <button onClick={()=>{setWeekOffset(0);setEditing(null);setPrepPanel(null);setIngredientsPanel(null);setAddingReminder(null);}}
              style={{ background:"#44403C",border:"none",color:"#D6D3D1",borderRadius:6,padding:"3px 8px",fontSize:10,cursor:"pointer",fontFamily:"system-ui,sans-serif",marginLeft:4 }}>
              Today
            </button>
          )}
        </div>
      </div>

      {/* ══ PLANNER GRID + SIDE PANEL ══ */}
      <div style={{ display:"flex", alignItems:"flex-start" }}>
        <div style={{ flex:1, padding:"24px 24px 32px 32px", overflowX:"auto", minWidth:0 }}>
          <div style={{ display:"grid", gridTemplateColumns:"72px repeat(7,1fr)", gap:0, minWidth:620, borderRadius:12, overflow:"hidden", border:"1px solid #E7E5E4", boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>

            {/* Corner */}
            <div style={{ background:"#1C1917", padding:"12px 8px" }} />

            {/* Day headers */}
            {DAYS.map((day, di) => {
              const date = weekDates[di];
              const isToday = isCurrentWeek && day===todayDow;
              return (
                <div key={day} style={{ background:isToday?"#292524":"#1C1917", padding:"10px 8px", textAlign:"center", borderLeft:"1px solid #292524" }}>
                  <div style={{ color:isToday?"#FCD34D":"#D6D3D1", fontSize:12, fontWeight:700, fontFamily:"system-ui,sans-serif", letterSpacing:"0.08em", textTransform:"uppercase" }}>{day}</div>
                  <div style={{ color:isToday?"#FCD34D":"#78716C", fontSize:10, fontFamily:"system-ui,sans-serif", marginTop:2 }}>{date.getDate()}</div>
                  {isToday && <div style={{ width:4,height:4,borderRadius:"50%",background:"#FCD34D",margin:"3px auto 0" }} />}
                </div>
              );
            })}

            {/* Rows */}
            {ALL_ROWS.map((row, rowIdx) => {
              // ── Reminder row ──
              if (row.type === "reminder") return (
                <>
                  <div key={`lbl-${row.slot}-${rowIdx}`} style={{ background:row.bg, borderTop:"1px solid #E7E5E4", display:"flex", alignItems:"center", justifyContent:"center", padding:"8px 4px" }}>
                    <span style={{ writingMode:"vertical-rl", transform:"rotate(180deg)", fontSize:9, fontWeight:700, fontFamily:"system-ui,sans-serif", letterSpacing:"0.12em", textTransform:"uppercase", color:row.accent }}>{row.label}</span>
                  </div>
                  {DAYS.map(day => (
                    <ReminderCell
                      key={`${day}-${row.slot}`}
                      day={day} slot={row.slot} color={row.accent} bg={row.bg}
                      items={getDayReminders(day, row.slot)}
                      isAdding={addingReminder?.day===day && addingReminder?.slot===row.slot}
                      addingReminderVal={newReminderVal}
                      editingReminder={editingReminder}
                      editingReminderVal={editingReminderVal}
                      reminderInputRef={reminderInputRef}
                      onAdd={()=>openAddReminder(day,row.slot)}
                      onCommitAdd={commitAddReminder}
                      onCancelAdd={()=>setAddingReminder(null)}
                      onChangeAddVal={v=>setNewReminderVal(v)}
                      onStartEdit={(i,val)=>{setEditingReminder({day,slot:row.slot,idx:i});setEditingReminderVal(val);}}
                      onCommitEdit={commitEditReminder}
                      onCancelEdit={()=>setEditingReminder(null)}
                      onChangeEditVal={v=>setEditingReminderVal(v)}
                      onRemove={i=>removeReminder(day,row.slot,i)}
                    />
                  ))}
                </>
              );

              // ── Egg row ──
              if (row.type === "egg") return (
                <>
                  <div key="lbl-egg" style={{ background:MEAL_COLORS["Breakfast"].bg, borderTop:"1px solid #E7E5E4", display:"flex", alignItems:"center", justifyContent:"center", padding:"8px 4px" }}>
                    <span style={{ writingMode:"vertical-rl", transform:"rotate(180deg)", fontSize:9, fontWeight:700, fontFamily:"system-ui,sans-serif", letterSpacing:"0.12em", textTransform:"uppercase", color:MEAL_COLORS["Breakfast"].accent }}>Egg</span>
                  </div>
                  {DAYS.map(day => {
                    const isEditingEgg = editing?.day===day && editing?.meal==="Egg";
                    const saved = justSaved===`${day}-Egg`;
                    return (
                      <div key={`${day}-egg`} style={{ background:saved?MEAL_COLORS["Breakfast"].light:MEAL_COLORS["Breakfast"].bg, borderTop:"1px solid #E7E5E4", borderLeft:"1px solid #E7E5E4", padding:"6px 8px", minHeight:40, display:"flex", alignItems:"center", transition:"background 0.3s" }}>
                        {isEditingEgg ? (
                          <div style={{ display:"flex", gap:4, width:"100%" }}>
                            <input autoFocus value={editValue} onChange={e=>setEditValue(e.target.value)}
                              onKeyDown={e=>{if(e.key==="Enter")commitEdit();if(e.key==="Escape")setEditing(null);}}
                              style={{ flex:1,border:"1.5px solid #D97706",borderRadius:5,padding:"3px 6px",fontSize:11,fontFamily:"system-ui,sans-serif",outline:"none",background:"#fff",minWidth:0 }} />
                            <button onClick={commitEdit} style={{ background:"#D97706",color:"#fff",border:"none",borderRadius:5,padding:"3px 8px",fontSize:11,cursor:"pointer" }}>✓</button>
                            <button onClick={()=>setEditing(null)} style={{ background:"transparent",color:"#A8A29E",border:"1px solid #D6D3D1",borderRadius:5,padding:"3px 6px",fontSize:11,cursor:"pointer" }}>✕</button>
                          </div>
                        ) : (
                          <div onClick={()=>startEditMeal(day,"Egg")} style={{ display:"flex", alignItems:"center", gap:5, cursor:"pointer", width:"100%" }}>
                            <span style={{ fontSize:11, fontFamily:"system-ui,sans-serif", color:"#92400E", flex:1 }}>{menu[day].Egg || "—"}</span>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </>
              );

              // ── Meal row ──
              const meal = row.slot;
              return (
                <>
                  <div key={`lbl-${meal}`} style={{ background:MEAL_COLORS[meal].bg, borderTop:"1px solid #E7E5E4", display:"flex", alignItems:"center", justifyContent:"center", padding:"8px 4px" }}>
                    <span style={{ writingMode:"vertical-rl", transform:"rotate(180deg)", fontSize:10, fontWeight:700, fontFamily:"system-ui,sans-serif", letterSpacing:"0.12em", textTransform:"uppercase", color:MEAL_COLORS[meal].accent }}>{meal}</span>
                  </div>
                  {DAYS.map(day => {
                    const key = `${day}-${meal}`;
                    const isEditingMeal = editing?.day===day && editing?.meal===meal;
                    const saved = justSaved===key;
                    const isPrepOpen = prepPanel?.day===day && prepPanel?.meal===meal;
                    const isIngOpen  = ingredientsPanel?.day===day && ingredientsPanel?.meal===meal;
                    const noteCount  = getPrepNotes(day,meal).length;
                    const ingCount   = getIngredients(day,meal).length;
                    return (
                      <div key={key} style={{ background:isPrepOpen||isIngOpen||saved?MEAL_COLORS[meal].light:MEAL_COLORS[meal].bg, borderTop:"1px solid #E7E5E4", borderLeft:"1px solid #E7E5E4", padding:"8px 8px 6px", minHeight:80, transition:"background 0.3s", outline:isPrepOpen||isIngOpen?`2px solid ${MEAL_COLORS[meal].accent}`:"none", outlineOffset:"-2px" }}>
                        {isEditingMeal ? (
                          <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                            <input autoFocus value={editValue} onChange={e=>setEditValue(e.target.value)}
                              onKeyDown={e=>{if(e.key==="Enter")commitEdit();if(e.key==="Escape")setEditing(null);}}
                              style={{ width:"100%",boxSizing:"border-box",border:`1.5px solid ${MEAL_COLORS[meal].accent}`,borderRadius:6,padding:"5px 8px",fontSize:12,fontFamily:"system-ui,sans-serif",outline:"none",background:"#fff" }} />
                            <div style={{ display:"flex", gap:4 }}>
                              <button onClick={commitEdit} style={{ flex:1,background:MEAL_COLORS[meal].accent,color:"#fff",border:"none",borderRadius:5,padding:"4px",fontSize:11,cursor:"pointer",fontFamily:"system-ui,sans-serif" }}>Save</button>
                              <button onClick={()=>setEditing(null)} style={{ flex:1,background:"transparent",color:"#A8A29E",border:"1px solid #D6D3D1",borderRadius:5,padding:"4px",fontSize:11,cursor:"pointer",fontFamily:"system-ui,sans-serif" }}>✕</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{ display:"flex", flexDirection:"column", height:"100%", minHeight:62 }}>
                            <p onClick={()=>startEditMeal(day,meal)} style={{ margin:"0 0 auto", fontSize:12, lineHeight:1.45, color:"#292524", fontFamily:"Georgia,serif", flex:1, cursor:"pointer" }}>{menu[day][meal]}</p>
                            <div style={{ display:"flex", justifyContent:"flex-end", alignItems:"center", gap:4, marginTop:8 }}>
                              {ingCount>0 && <span style={{ fontSize:9,fontFamily:"system-ui,sans-serif",color:MEAL_COLORS[meal].accent,background:MEAL_COLORS[meal].accent+"18",borderRadius:8,padding:"1px 5px",fontWeight:700 }}>{ingCount}</span>}
                              {noteCount>0 && <span style={{ fontSize:9,fontFamily:"system-ui,sans-serif",color:"#78716C",background:"#F5F5F4",borderRadius:8,padding:"1px 5px",fontWeight:700 }}>📋{noteCount}</span>}
                              {/* Ingredients button (replaces pencil) */}
                              <button onClick={()=>isIngOpen?closeIngredientsPanel():openIngredientsPanel(day,meal)} title="Ingredients"
                                style={{ background:isIngOpen?MEAL_COLORS[meal].accent:"transparent", border:`1px solid ${isIngOpen?MEAL_COLORS[meal].accent:MEAL_COLORS[meal].accent+"50"}`, borderRadius:5, padding:"3px 5px", cursor:"pointer", display:"flex", alignItems:"center", transition:"all 0.15s" }}>
                                <IngredientsIcon color={isIngOpen?"#fff":MEAL_COLORS[meal].accent} />
                              </button>
                              {/* Prep button */}
                              <button onClick={()=>isPrepOpen?closePrepPanel():openPrepPanel(day,meal)} title="Prep notes"
                                style={{ background:isPrepOpen?"#78716C":"transparent", border:`1px solid ${isPrepOpen?"#78716C":"#78716C50"}`, borderRadius:5, padding:"3px 5px", cursor:"pointer", display:"flex", alignItems:"center", transition:"all 0.15s" }}>
                                <ClipboardIcon color={isPrepOpen?"#fff":"#78716C"} />
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </>
              );
            })}
          </div>
          <p style={{ marginTop:14, color:"#A8A29E", fontSize:11, fontFamily:"system-ui,sans-serif", textAlign:"center" }}>
            tap meal name to rename · ☰ ingredients → auto-adds to grocery · 📋 prep notes
          </p>
        </div>

        {/* ── Side Panel: Ingredients or Prep ── */}
        {(ingredientsPanel || prepPanel) && panelMealColor && (
          <div style={{ width:260, flexShrink:0, margin:"24px 32px 32px 0", border:`2px solid ${panelMealColor.accent}`, borderRadius:12, background:"#fff", boxShadow:"0 4px 20px rgba(0,0,0,0.1)", overflow:"hidden", animation:"slideIn 0.18s ease" }}>
            <div style={{ background:panelMealColor.accent, padding:"12px 14px", display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
              <div>
                <div style={{ color:"rgba(255,255,255,0.75)", fontSize:10, fontFamily:"system-ui,sans-serif", letterSpacing:"0.1em", textTransform:"uppercase" }}>
                  {ingredientsPanel ? `${ingredientsPanel.day} · ${ingredientsPanel.meal}` : `${prepPanel.day} · ${prepPanel.meal}`}
                </div>
                <div style={{ color:"#fff", fontSize:13, fontFamily:"Georgia,serif", marginTop:3, lineHeight:1.3 }}>
                  {ingredientsPanel ? "Ingredients" : "Prep Notes"}
                </div>
              </div>
              <button onClick={()=>{ closeIngredientsPanel(); closePrepPanel(); }} style={{ background:"rgba(255,255,255,0.2)", border:"none", color:"#fff", borderRadius:6, width:22, height:22, cursor:"pointer", fontSize:13, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginLeft:8 }}>×</button>
            </div>

            {/* ── Ingredients panel content ── */}
            {ingredientsPanel && (
              <>
                <div style={{ padding:"10px 14px 4px" }}>
                  <p style={{ fontSize:10, color:"#A8A29E", fontFamily:"system-ui,sans-serif", marginBottom:8 }}>Items auto-add to your grocery pantry</p>
                  {panelIngredients.length === 0
                    ? <p style={{ color:"#C4B5A5", fontSize:12, fontFamily:"system-ui,sans-serif", fontStyle:"italic", textAlign:"center", padding:"8px 0" }}>No ingredients yet</p>
                    : panelIngredients.map((ing, i) => {
                        const ingName = ing.name || ing;
                        const ingCat  = ing.cat  || guessCategory(ingName);
                        return (
                          <div key={i} style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 0", borderBottom:"1px solid #F5F5F4" }}>
                            <div style={{ width:5, height:5, borderRadius:"50%", background:panelMealColor.accent, flexShrink:0 }} />
                            <span style={{ flex:1, fontSize:12, fontFamily:"system-ui,sans-serif", color:"#44403C" }}>{ingName}</span>
                            <select value={ingCat}
                              onChange={e=>updateIngredientCat(ingredientsPanel.day, ingredientsPanel.meal, i, e.target.value)}
                              style={{ fontSize:10, color:"#78716C", background:"#F5F5F4", border:"1px solid #E7E5E4", borderRadius:5, padding:"2px 4px", fontFamily:"system-ui,sans-serif", cursor:"pointer", outline:"none", maxWidth:80 }}>
                              {GROCERY_CATS.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            <button onClick={()=>removeIngredient(ingredientsPanel.day, ingredientsPanel.meal, i)} style={{ background:"none", border:"none", color:"#C4B5A5", cursor:"pointer", fontSize:14, padding:0, lineHeight:1 }}>×</button>
                          </div>
                        );
                      })
                  }
                </div>
                <div style={{ padding:"10px 14px 14px", borderTop:"1px solid #F5F5F4", marginTop:4 }}>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    <input ref={ingInputRef} value={newIngredient} onChange={e=>{setNewIngredient(e.target.value);setNewIngredientCat(guessCategory(e.target.value)||newIngredientCat);}}
                      onKeyDown={e=>e.key==="Enter"&&addIngredient()}
                      placeholder="e.g. oats, papaya…"
                      style={{ flex:1, minWidth:80, border:`1px solid ${panelMealColor.accent}40`, borderRadius:7, padding:"6px 10px", fontSize:12, fontFamily:"system-ui,sans-serif", outline:"none", background:"#FFF7ED", color:"#292524" }} />
                    <select value={newIngredientCat} onChange={e=>setNewIngredientCat(e.target.value)}
                      style={{ border:`1px solid ${panelMealColor.accent}40`, borderRadius:7, padding:"6px 8px", fontSize:11, fontFamily:"system-ui,sans-serif", outline:"none", background:"#fff", color:"#44403C", cursor:"pointer" }}>
                      {GROCERY_CATS.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                    <button onMouseDown={e=>{e.preventDefault();addIngredient();}} style={{ background:panelMealColor.accent, color:"#fff", border:"none", borderRadius:7, padding:"6px 14px", cursor:"pointer", fontSize:17, lineHeight:1 }}>+</button>
                  </div>
                </div>
              </>
            )}

            {/* ── Prep panel content ── */}
            {prepPanel && (
              <>
                <div style={{ padding:"12px 14px", minHeight:60 }}>
                  {panelNotes.length===0
                    ? <p style={{ color:"#C4B5A5", fontSize:12, fontFamily:"system-ui,sans-serif", fontStyle:"italic", margin:"6px 0", textAlign:"center" }}>No prep notes yet</p>
                    : panelNotes.map((note, i) => (
                        <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:7, padding:"7px 8px", background:panelMealColor.bg, borderRadius:7, marginBottom:6, border:`1px solid ${panelMealColor.accent}20` }}>
                          <div style={{ width:5, height:5, borderRadius:"50%", background:panelMealColor.accent, marginTop:4, flexShrink:0 }} />
                          {editingPrepIdx===i
                            ? <input autoFocus value={editingPrepVal} onChange={e=>setEditingPrepVal(e.target.value)}
                                onKeyDown={e=>{if(e.key==="Enter")commitEditPrepNote(i);if(e.key==="Escape")setEditingPrepIdx(null);}}
                                style={{ flex:1, border:`1px solid ${panelMealColor.accent}`, borderRadius:4, padding:"2px 6px", fontSize:12, fontFamily:"system-ui,sans-serif", outline:"none", background:"#fff" }} />
                            : <span onClick={()=>{setEditingPrepIdx(i);setEditingPrepVal(note);}} style={{ flex:1, fontSize:12, fontFamily:"system-ui,sans-serif", color:"#44403C", lineHeight:1.4, cursor:"pointer" }}>{note}</span>
                          }
                          <button onClick={()=>removePrepNote(i)} style={{ background:"none", border:"none", color:"#C4B5A5", cursor:"pointer", fontSize:14, padding:0, lineHeight:1 }}>×</button>
                        </div>
                      ))
                  }
                </div>
                <div style={{ padding:"10px 14px 14px", borderTop:`1px solid ${panelMealColor.accent}20` }}>
                  <div style={{ display:"flex", gap:6 }}>
                    <input value={newPrepNote} onChange={e=>setNewPrepNote(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&addPrepNote()}
                      placeholder="e.g. marinate overnight…"
                      style={{ flex:1, border:`1px solid ${panelMealColor.accent}40`, borderRadius:7, padding:"6px 10px", fontSize:12, fontFamily:"system-ui,sans-serif", outline:"none", background:panelMealColor.bg, color:"#292524" }} />
                    <button onClick={addPrepNote} style={{ background:panelMealColor.accent, color:"#fff", border:"none", borderRadius:7, padding:"6px 11px", cursor:"pointer", fontSize:17, lineHeight:1 }}>+</button>
                  </div>
                  <p style={{ margin:"7px 0 0", fontSize:10, color:"#A8A29E", fontFamily:"system-ui,sans-serif" }}>Tap a note to edit</p>
                </div>
              </>
            )}
          </div>
        )}
      </div>

      {/* ══════════════════════════════════
          GROCERY SECTION — your app style
      ══════════════════════════════════ */}
      <div style={{ borderTop:"2px solid #E7E5E4" }}>

        {/* Grocery header + tabs */}
        <div style={{ background:"#292524", padding:"20px 32px 0" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
            <div>
              <div style={{ color:"#A8A29E", fontSize:11, letterSpacing:"0.18em", textTransform:"uppercase", marginBottom:3, fontFamily:"system-ui,sans-serif" }}>Weekly</div>
              <h2 style={{ color:"#FAFAF8", margin:0, fontSize:22, fontWeight:"normal", letterSpacing:"-0.01em" }}>Groceries</h2>
            </div>
            {lowCount > 0 && (
              <div style={{ background:"#3B1F05", border:"1px solid #92400E", borderRadius:8, padding:"6px 12px", fontSize:12, fontFamily:"system-ui,sans-serif", color:"#FCD34D" }}>
                {lowCount} item{lowCount!==1?"s":""} need a top-up
              </div>
            )}
          </div>
          {/* Tabs */}
          <div style={{ display:"flex", borderBottom:"none" }}>
            {[["pantry","Fridge & Pantry"],["list","Shopping List"]].map(([id,label]) => (
              <button key={id} onClick={()=>setGroceryTab(id)} style={{ flex:1, textAlign:"center", fontSize:13, fontWeight:500, padding:"10px 0", cursor:"pointer", color:groceryTab===id?"#FAFAF8":"#78716C", background:"transparent", border:"none", borderBottom:`2px solid ${groceryTab===id?"#FAFAF8":"transparent"}`, fontFamily:"system-ui,sans-serif", transition:"all 0.15s" }}>
                {label}
              </button>
            ))}
          </div>
        </div>

        {/* ── Fridge & Pantry tab ── */}
        {groceryTab === "pantry" && (
          <div style={{ background:"#FAFAF8", padding:"20px 32px 40px" }}>
            {/* Add item row */}
            <div style={{ display:"flex", gap:8, marginBottom:24 }}>
              <input value={newGrocName} onChange={e=>setNewGrocName(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&addGrocItem()}
                placeholder="Add item…"
                style={{ flex:1, height:42, padding:"0 12px", border:"1px solid #D6D3D1", borderRadius:8, background:"#fff", color:"#292524", fontFamily:"system-ui,sans-serif", fontSize:14, outline:"none" }} />
              <select value={newGrocCat} onChange={e=>setNewGrocCat(e.target.value)}
                style={{ height:42, padding:"0 8px", border:"1px solid #D6D3D1", borderRadius:8, background:"#fff", color:"#292524", fontFamily:"system-ui,sans-serif", fontSize:13, outline:"none" }}>
                {GROCERY_CATS.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <button onClick={addGrocItem} style={{ height:42, padding:"0 18px", background:"#1C1917", color:"#fff", border:"none", borderRadius:8, fontFamily:"system-ui,sans-serif", fontSize:13, fontWeight:500, cursor:"pointer" }}>Add</button>
            </div>

            {groceryItems.length === 0
              ? <p style={{ textAlign:"center", color:"#A8A29E", fontFamily:"system-ui,sans-serif", fontSize:14, padding:"2rem 0" }}>No items yet — add ingredients to your meals above!</p>
              : GROCERY_CATS.filter(cat => groceryItems.some(g=>g.cat===cat)).map(cat => (
                  <div key={cat} style={{ marginBottom:20 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                      <span style={{ fontSize:11, fontWeight:500, textTransform:"uppercase", letterSpacing:"0.6px", color:"#78716C", fontFamily:"system-ui,sans-serif", whiteSpace:"nowrap" }}>{cat}</span>
                      <div style={{ flex:1, height:"0.5px", background:"#E7E5E4" }} />
                    </div>
                    {groceryItems.filter(g=>g.cat===cat).map(item => (
                      <div key={item.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0", borderBottom:"0.5px solid #F0EDE8" }}>
                        <div style={{ flex:1, fontSize:14, color:"#292524", fontFamily:"system-ui,sans-serif" }}>{item.name}</div>
                        <div style={{ display:"flex", gap:3 }}>
                          {[["ok","Good","#16A34A","#F0FDF4","#BBF7D0"],["low","Low","#D97706","#FFFBEB","#FDE68A"],["out","Out","#DC2626","#FEF2F2","#FECACA"]].map(([s,label,col,bg,border]) => (
                            <button key={s} onClick={()=>setStatus(item.id, s)}
                              style={{ fontSize:11, fontWeight:500, padding:"5px 9px", borderRadius:99, border:`0.5px solid ${item.status===s?border:"#D6D3D1"}`, cursor:"pointer", background:item.status===s?bg:"#FAFAF8", color:item.status===s?col:"#78716C", fontFamily:"system-ui,sans-serif", transition:"all 0.12s" }}>
                              {label}
                            </button>
                          ))}
                        </div>
                        <button onClick={()=>removeGrocItem(item.id)} style={{ background:"none", border:"none", color:"#C4B5A5", cursor:"pointer", fontSize:18, padding:"0 2px", lineHeight:1 }}>×</button>
                      </div>
                    ))}
                  </div>
                ))
            }
          </div>
        )}

        {/* ── Shopping List tab ── */}
        {groceryTab === "list" && (
          <div style={{ background:"#FAFAF8", padding:"20px 32px 40px" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
              <div>
                <div style={{ fontSize:15, fontWeight:500, color:"#292524", fontFamily:"system-ui,sans-serif" }}>To buy</div>
                {needItems.length > 0 && <div style={{ fontSize:12, color:"#78716C", fontFamily:"system-ui,sans-serif", marginTop:2 }}>{needItems.length - tickedCount} to grab · {tickedCount} ticked off</div>}
              </div>
              {tickedCount > 0 && (
                <button onClick={clearChecked} style={{ fontSize:12, color:"#78716C", background:"none", border:"0.5px solid #D6D3D1", padding:"6px 12px", borderRadius:8, cursor:"pointer", fontFamily:"system-ui,sans-serif" }}>Clear ticked</button>
              )}
            </div>

            {needItems.length === 0
              ? <div style={{ textAlign:"center", padding:"3rem 1rem", color:"#A8A29E" }}>
                  <div style={{ fontSize:32, marginBottom:12 }}>🛒</div>
                  <div style={{ fontSize:14, fontFamily:"system-ui,sans-serif" }}>Nothing needed — everything is stocked up!</div>
                </div>
              : (() => {
                  const sorted = [...needItems].sort((a,b)=>{
                    if(a.checked!==b.checked) return a.checked?1:-1;
                    if(a.status!==b.status) return a.status==="out"?-1:1;
                    return GROCERY_CATS.indexOf(a.cat)-GROCERY_CATS.indexOf(b.cat);
                  });
                  const byCat = {};
                  sorted.forEach(i => { (byCat[i.cat]=byCat[i.cat]||[]).push(i); });
                  return Object.entries(byCat).map(([cat, citems]) => (
                    <div key={cat} style={{ marginBottom:20 }}>
                      <div style={{ fontSize:11, fontWeight:500, textTransform:"uppercase", letterSpacing:"0.6px", color:"#78716C", fontFamily:"system-ui,sans-serif", paddingBottom:6, borderBottom:"0.5px solid #E7E5E4", marginBottom:2 }}>{cat}</div>
                      {citems.map(item => (
                        <div key={item.id} onClick={()=>toggleChecked(item.id)} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0", borderBottom:"0.5px solid #F0EDE8", cursor:"pointer" }}>
                          <div style={{ width:20, height:20, borderRadius:6, border:item.checked?"none":"1.5px solid #D6D3D1", background:item.checked?"#639922":"transparent", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.15s" }}>
                            {item.checked && <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 6l3 3 5-5"/></svg>}
                          </div>
                          <span style={{ flex:1, fontSize:14, fontFamily:"system-ui,sans-serif", color:item.checked?"#A8A29E":"#292524", textDecoration:item.checked?"line-through":"none", transition:"all 0.15s" }}>{item.name}</span>
                          <span style={{ fontSize:11, fontWeight:500, padding:"3px 8px", borderRadius:99, background:item.status==="out"?"#FEF2F2":"#FFFBEB", color:item.status==="out"?"#DC2626":"#D97706", fontFamily:"system-ui,sans-serif" }}>
                            {item.status==="out"?"Out":"Low"}
                          </span>
                        </div>
                      ))}
                    </div>
                  ));
                })()
            }
          </div>
        )}
      </div>

      <style>{`
        @keyframes slideDown { from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);} }
        @keyframes slideIn  { from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);} }
      `}</style>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(MealPlanner));
  </script>
</body>
</html>
